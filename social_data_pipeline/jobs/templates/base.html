<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}SDP Jobs{% endblock %}</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <link rel="stylesheet" href="/static/prism.min.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/prism-core.min.js" defer></script>
  <script src="/static/prism-sql.min.js" defer></script>
  <style>
    :root { --pico-font-size: 90%; }
    main.container { max-width: 1400px; padding-top: 1rem; padding-bottom: 2rem; }
    nav.topnav { border-bottom: 1px solid var(--pico-muted-border-color); margin-bottom: 1rem; }
    nav.topnav ul { padding: 0.5rem 0; }
    nav.topnav a { text-decoration: none; padding: 0.25rem 0.5rem; border-radius: 4px; }
    nav.topnav a.active { background: var(--pico-primary-background); color: var(--pico-primary-inverse); }
    table { font-size: 0.9rem; }
    table td, table th { vertical-align: top; padding: 0.5rem 0.6rem; }
    td.sql, td.sqlprev { font-family: var(--pico-font-family-monospace); font-size: 0.82rem; color: var(--pico-color-slate-700); }
    td.sqlprev { max-width: 38rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-pending { color: var(--pico-color-amber-600); }
    .status-approved { color: var(--pico-primary); }
    .status-running { color: var(--pico-color-cyan-600); font-weight: 600; }
    .status-done { color: var(--pico-color-jade-600); }
    .status-failed, .status-cancelled { color: var(--pico-color-red-600); }
    .status-rejected { color: var(--pico-muted-color); }
    .muted { color: var(--pico-muted-color); font-size: 0.85rem; }
    .row-actions { white-space: nowrap; }
    .row-actions button, .row-actions form { display: inline-block; margin: 0 0.2rem 0 0; }
    .row-actions form { margin-bottom: 0; }
    .row-actions button { font-size: 0.75rem; padding: 0.2rem 0.5rem; margin-bottom: 0; }
    .error-box { background: var(--pico-color-red-50); color: var(--pico-color-red-800); padding: 0.5rem; border-radius: 4px; font-family: var(--pico-font-family-monospace); font-size: 0.82rem; white-space: pre-wrap; }
    .empty-state { text-align: center; color: var(--pico-muted-color); padding: 3rem 0; }
    .summary-bar { display: flex; gap: 2rem; margin: 0.5rem 0 1rem; color: var(--pico-muted-color); font-size: 0.88rem; }
    code.copyable { cursor: pointer; border-radius: 3px; padding: 0.05rem 0.3rem; transition: background 0.15s; }
    code.copyable:hover { background: var(--pico-primary-focus); }
    code.copyable.copied { background: var(--pico-color-jade-200); color: var(--pico-color-jade-800); }
    tr.row-expandable { cursor: pointer; }
    tr.row-expandable:hover { background: var(--pico-code-background-color); }
    tr.row-expandable.expanded { background: var(--pico-code-background-color); }
    tr.row-expandable .caret { display: inline-block; width: 1em; color: var(--pico-muted-color); user-select: none; }
    tr.row-expandable.expanded .caret { color: var(--pico-primary); }
    tr.row-details { display: none; }
    tr.row-details.open { display: table-row; }
    tr.row-details > td { border-top: none; padding: 0 0.6rem 0.8rem 0.6rem; background: var(--pico-code-background-color); }
    tr.row-details pre { margin: 0; padding: 0.6rem; background: var(--pico-background-color); border-radius: 4px; overflow-x: auto; white-space: pre-wrap; font-size: 0.82rem; }
    tr.row-details pre code { background: transparent; padding: 0; font-size: inherit; text-shadow: none; }
    td.description { max-width: 22em; font-size: 0.85rem; line-height: 1.3; }
    td.description:empty::before { content: "—"; color: var(--pico-muted-color); }
  </style>
</head>
<body>
  <main class="container">
    <nav class="topnav">
      <ul>
        <li><strong>SDP Jobs</strong></li>
      </ul>
      <ul>
        <li><a href="/pending" class="{% if tab == 'pending' %}active{% endif %}">Pending <span class="muted">({{ counts.pending }})</span></a></li>
        <li><a href="/running" class="{% if tab == 'running' %}active{% endif %}">Running <span class="muted">({{ counts.running }})</span></a></li>
        <li><a href="/history" class="{% if tab == 'history' %}active{% endif %}">History</a></li>
      </ul>
    </nav>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Copy-on-click for <code class="copyable">. Uses navigator.clipboard
    // when available (HTTPS or localhost) and falls back to a hidden
    // textarea + execCommand('copy') for plain-HTTP contexts like Tailscale.
    (function () {
      function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve) {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (_) {}
          document.body.removeChild(ta);
          resolve();
        });
      }
      document.addEventListener('click', function (ev) {
        var el = ev.target.closest('code.copyable');
        if (!el) return;
        ev.stopPropagation();
        copyText(el.textContent).then(function () {
          el.classList.add('copied');
          var prev = el.getAttribute('title');
          el.setAttribute('title', 'Copied!');
          setTimeout(function () {
            el.classList.remove('copied');
            if (prev) el.setAttribute('title', prev);
          }, 900);
        });
      });

      // Re-run Prism highlighting after htmx swaps in new content
      // (e.g. the running-rows fragment refreshes every 2s).
      document.body.addEventListener('htmx:afterSwap', function () {
        if (window.Prism) window.Prism.highlightAll();
      });

      // Click an expandable row to reveal its SQL/error details row below.
      // Ignore clicks on interactive children so Approve/Reject/Kill and
      // copy-on-click continue to work normally.
      document.addEventListener('click', function (ev) {
        if (ev.target.closest('form, button, input, a, code.copyable, details, summary')) return;
        var row = ev.target.closest('tr.row-expandable');
        if (!row) return;
        var next = row.nextElementSibling;
        if (!next || !next.classList.contains('row-details')) return;
        next.classList.toggle('open');
        row.classList.toggle('expanded');
        var caret = row.querySelector('.caret');
        if (caret) caret.textContent = next.classList.contains('open') ? '▾' : '▸';
      });
    })();
  </script>
</body>
</html>
