# Parse profile pipeline configuration
# Host paths (DUMPS_PATH, EXTRACTED_PATH, PARSED_PATH) are configured in .env
#
# Platform selection: Set PLATFORM env var (default: reddit)
#   PLATFORM=reddit  - Reddit data dumps
#   PLATFORM=custom/<name> - Custom JSON/NDJSON platform

processing:
  # Data types to process - these map to keys in the platform's fields config
  # Define your data types in config/sources/<source>/platform.yaml
  data_types: []  # Override in source config or set via platform config
  parallel_mode: true       # If true: parse multiple files in parallel
  parse_workers: 8           # Number of parallel workers for CSV parsing
  cleanup_temp: false        # Delete intermediate files after processing
  watch_interval: 0          # Check for new files every N minutes (0 = run once)

# Parquet output tuning (only applies when file_format: parquet in platform.yaml)
# Set parquet_row_group_size in config/sources/<source>/platform.yaml
# Default: 1000000 (1M rows per row-group)
# Affects compression, predicate pushdown granularity, and bloom filter selectivity
# in external-table engines (DuckDB, StarRocks, ClickHouse)
