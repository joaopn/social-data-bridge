# StarRocks FE Configuration
# Mounted into container at /data/deploy/starrocks/fe/conf/fe.conf
# Values may be updated by: python sdp.py db setup

# Network
http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010

# Memory (conservative defaults for single-node)
# Updated by sdp db setup based on user input
jvm_heap_size = 7g

# Logging
sys_log_level = WARN
audit_log_modules = slow_query
