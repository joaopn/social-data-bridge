# StarRocks BE Configuration
# Mounted into container at /data/deploy/starrocks/be/conf/be.conf
# Values may be updated by: python sdp.py db setup

# Network
be_port = 9060
be_http_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060

# Memory
# mem_limit as absolute value (e.g. "16G") or percentage of system RAM
# Updated by sdp db setup based on user input
mem_limit = 27G

# Compaction (conservative for single-node analytical workload)
cumulative_compaction_num_threads_per_disk = 1
base_compaction_num_threads_per_disk = 1

# Logging
sys_log_level = WARN
