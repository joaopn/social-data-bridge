# Generic platform configuration
# Defines file patterns and data types for arbitrary JSON/CSV data

# Database schema for this platform (required - set in user.yaml)
db_schema: null

# Data types available for this platform
# Override in user.yaml with your own data types
data_types: []

# File patterns for detecting input files
# Generic platform uses simple patterns - customize as needed
# Each data type should have patterns defined here
file_patterns: {}
  # Example for custom data type 'posts':
  # posts:
  #   zst: '^posts_(\d{4}-\d{2})\.zst$'
  #   json: '^posts_(\d{4}-\d{2})$'
  #   csv: '^posts_(\d{4}-\d{2})\.csv$'
  #   prefix: 'posts_'

# Default index fields for database tables
# Override in user.yaml with your platform-specific indexes
indexes: {}
