# Default configuration for the query scheduler (jobs profile).
#
# User-specific settings — targets, port overrides, timeouts, auth
# toggle — live in config.local.yaml, which is generated by
# `sdp db setup-jobs` and gitignored. Values here are the fallbacks
# used for any key the local file omits.
#
# Shape of config.local.yaml mirrors this one, plus a `targets:` block,
# e.g.:
#     port: 8050
#     auth: false
#     targets:
#       reddit_pg:
#         backend: postgres
#         database: datasets

port: 8050
max_concurrent: 5
history_retention: 500

# Per-backend default query timeouts (seconds). 0 = no limit where the
# backend allows it (PG native, Mongo skips maxTimeMS). StarRocks caps
# at 259200 (72h) and rejects 0.
default_timeouts:
  postgres: 0
  starrocks: 259200
  mongodb: 0

# Require the DB admin password on the web UI. Off by default — UI is
# open. Turn on via `sdp db setup-jobs` when you want admin-gated
# approvals.
auth: false
