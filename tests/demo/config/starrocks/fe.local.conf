# StarRocks FE — tuned for free-tier Codespace (2 cores / 8 GB).
# Mounted into container at /data/deploy/starrocks/fe/conf/fe.conf.

http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010

jvm_heap_size = 1g

sys_log_level = WARN
audit_log_modules = slow_query

enable_outfile_to_local = true
