# StarRocks BE — tuned for free-tier Codespace (2 cores / 8 GB).
# Mounted into container at /data/deploy/starrocks/be/conf/be.conf.

be_port = 9060
be_http_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060

mem_limit = 2G

cumulative_compaction_num_threads_per_disk = 1
base_compaction_num_threads_per_disk = 1
alter_tablet_worker_count = 1

sys_log_level = WARN
