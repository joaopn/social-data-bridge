# Codespace-tuned overrides for 8 GB / 2-core free tier.
# Includes the tracked base config first, then scales down the memory-heavy
# settings (shared_buffers, work_mem, WAL, parallel workers) that PGTune sized
# for a large analytical server.

include 'postgresql.conf'

# Memory
shared_buffers = 512MB
temp_buffers = 64MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB

# WAL
min_wal_size = 256MB
max_wal_size = 1GB

# Parallelism
max_worker_processes = 4
max_parallel_workers = 2
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
