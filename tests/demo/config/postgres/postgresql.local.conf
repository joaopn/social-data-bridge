# Codespace-tuned overrides for 8 GB / 2-core free tier. Sized assuming the
# visitor picked one DB (per WELCOME.md), so postgres is the only heavy
# allocator alongside VS Code server (~1.5G), jobs + MCP containers (~0.7G),
# and a pipeline worker during runs (~1-2G peak). That leaves ~3-4G for
# postgres — PGTune's DW profile for that budget.

include 'postgresql.conf'

# Memory
shared_buffers = 1GB
temp_buffers = 128MB
effective_cache_size = 3GB
work_mem = 32MB
maintenance_work_mem = 256MB

# WAL
min_wal_size = 256MB
max_wal_size = 1GB

# Parallelism (matches 2-core Codespace)
max_worker_processes = 4
max_parallel_workers = 2
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
